<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alper Bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="shell__header">
        <div class="brand">
          <span class="brand__dot" aria-hidden="true"></span>
          <h1>Alper Bot</h1>
        </div>
      </header>

      <section id="chat-box" class="chat-box" aria-live="polite"></section>

      <form id="chat-form" class="chat-form">
        <input
          id="message-input"
          name="message"
          type="text"
          autocomplete="off"
          placeholder="Mesajını yaz..."
          required
        />
        <button id="send-button" type="submit">Gonder</button>
      </form>
    </main>

    <template id="message-template">
      <article class="message">
        <p class="message__label"></p>
        <p class="message__text"></p>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
